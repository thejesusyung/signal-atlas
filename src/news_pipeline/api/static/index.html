<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,sans-serif;overflow:hidden;width:100vw;height:100vh;background:#fafaf8;color:#1a0f08}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

::-webkit-scrollbar-thumb{background:#d8cdc4;border-radius:3px}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">

/* ── PALETTE ─────────────────────────────────────────────── */
const ACCENT_DEFAULT = '#1e7a5e'; // green — best per design chat
function makeC(accent) {
  return {
    bg:         '#fafaf8',
    surface:    '#ffffff',
    surface2:   '#f4f3f0',
    border:     '#e0dbd4',
    borderSub:  '#eae7e2',
    t1:         '#120a04',
    t2:         '#261408',
    t3:         '#3d2010',
    t4:         '#4a2e1a',
    muted:      '#62402a',
    faint:      '#7a5438',
    accent,
    accentSurf: accent + '18',
    accentBord: accent + '40',
    green:      '#1e6b38',
    greenSurf:  '#e8f5ed',
    greenBord:  '#90c8a0',
    greenDark:  '#145228',
    amber:      '#8a5c10',
    sidebar:    '#f4f3f0',
  };
}

/* ── WRITER DISPLAY METADATA ─────────────────────────────── */
// Static display data per writer name; fetched data (scores/tweets/evolution)
// overrides everything else at runtime.
const WRITER_META = {
  DataDeskDaily:   { archetype:'The Empiricist', color:'#4060b8' },
  SharpTake:       { archetype:'The Contrarian', color:'#9e2b48' },
  TheBreakingWire: { archetype:'The Wire',       color:'#8a6008' },
  FeedChronos:     { archetype:'The Deadpan',    color:'#1e7a5e' },
  PulseReport:     { archetype:'The Human',      color:'#6b3ea8' },
};

// Deterministic color for unknown writers
const PALETTE = ['#4060b8','#9e2b48','#8a6008','#1e7a5e','#6b3ea8','#c4622a','#1a6b7a','#7a3ea8'];
function writerColor(name) {
  if (WRITER_META[name]) return WRITER_META[name].color;
  let h = 0; for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return PALETTE[h % PALETTE.length];
}
function writerArchetype(name) {
  return WRITER_META[name]?.archetype || 'Writer';
}

/* ── UTILS ───────────────────────────────────────────────── */
function scoreColor(s, C){ return s>=0.5?C.green:s>=0.43?C.accent:C.amber; }
function heatColor(publishedAt){
  if (!publishedAt) return '#8a7060';
  const h = (Date.now() - new Date(publishedAt).getTime()) / 3600000;
  return h<2?'#c0392b':h<6?'#b5600a':h<12?'#9a7010':'#8a7060';
}
function fmtCycleDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

/* ── SVG WRITER ICONS ────────────────────────────────────── */
function WriterIcon({ name, color, size=22 }) {
  const c = color || writerColor(name);
  switch (name) {
    case 'DataDeskDaily': return (
      <svg width={size} height={size} viewBox="0 0 22 22" fill="none">
        <rect x="2" y="12" width="3.5" height="8" rx="1" fill={c} opacity=".9"/>
        <rect x="7" y="8" width="3.5" height="12" rx="1" fill={c} opacity=".9"/>
        <rect x="12" y="4" width="3.5" height="16" rx="1" fill={c} opacity=".9"/>
        <rect x="17" y="9" width="3" height="11" rx="1" fill={c} opacity=".55"/>
        <line x1="2" y1="21" x2="20" y2="21" stroke={c} strokeWidth="1.2" opacity=".4"/>
      </svg>
    );
    case 'SharpTake': return (
      <svg width={size} height={size} viewBox="0 0 22 22" fill="none">
        <path d="M12 2L4 13h6.5L9 20l9-11h-6.5L12 2z" fill={c} opacity=".9"/>
      </svg>
    );
    case 'TheBreakingWire': return (
      <svg width={size} height={size} viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="14" r="2.5" fill={c} opacity=".9"/>
        <path d="M6.5 19.5a7 7 0 0 1 9 0" stroke={c} strokeWidth="1.5" strokeLinecap="round" opacity=".4"/>
        <path d="M3.5 16.5a11 11 0 0 1 15 0" stroke={c} strokeWidth="1.5" strokeLinecap="round" opacity=".25"/>
        <path d="M9 11a3.5 3.5 0 0 1 4 0" stroke={c} strokeWidth="1.5" strokeLinecap="round" opacity=".7"/>
        <path d="M6.2 8.5a7 7 0 0 1 9.6 0" stroke={c} strokeWidth="1.5" strokeLinecap="round" opacity=".5"/>
      </svg>
    );
    case 'FeedChronos': return (
      <svg width={size} height={size} viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="8.5" stroke={c} strokeWidth="1.5" opacity=".9"/>
        <line x1="11" y1="11" x2="11" y2="5.5" stroke={c} strokeWidth="1.8" strokeLinecap="round" opacity=".9"/>
        <line x1="11" y1="11" x2="15" y2="13.5" stroke={c} strokeWidth="1.4" strokeLinecap="round" opacity=".9"/>
        <circle cx="11" cy="11" r="1.2" fill={c} opacity=".9"/>
      </svg>
    );
    case 'PulseReport': return (
      <svg width={size} height={size} viewBox="0 0 22 22" fill="none">
        <path d="M1 12h3.5l2-5 3 9 3-12 2.5 8H21" stroke={c} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" opacity=".9"/>
      </svg>
    );
    default: {
      // Generic initial avatar for unknown writers
      const initial = name.charAt(0).toUpperCase();
      return (
        <svg width={size} height={size} viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="9" fill={c} opacity=".15"/>
          <text x="11" y="15" textAnchor="middle" fontSize="11" fontWeight="700" fill={c} fontFamily="DM Sans,sans-serif">{initial}</text>
        </svg>
      );
    }
  }
}

/* ── TICKER ──────────────────────────────────────────────── */
function Ticker({ items }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current; if (!el) return;
    let id, start = null;
    function step(ts) {
      if (!start) start = ts;
      const w = el.scrollWidth / 2;
      if (w > 0) el.style.transform = `translateX(-${((ts - start) / 1000 * 50) % w}px)`;
      id = requestAnimationFrame(step);
    }
    id = requestAnimationFrame(step);
    return () => cancelAnimationFrame(id);
  }, [items]);

  const doubled = [...items, ...items];
  return (
    <div style={{position:'fixed',bottom:0,left:0,right:0,height:36,background:'#120a04',borderTop:'1px solid rgba(255,255,255,.07)',display:'flex',alignItems:'center',overflow:'hidden',zIndex:200}}>
      <div style={{flexShrink:0,padding:'0 14px',fontSize:8.5,fontWeight:700,letterSpacing:'.16em',color:'#5ab06a',borderRight:'1px solid rgba(255,255,255,.07)',height:'100%',display:'flex',alignItems:'center',gap:6}}>
        <span style={{width:6,height:6,borderRadius:'50%',background:'#5ab06a',animation:'livePulse 1.8s ease-in-out infinite',display:'inline-block'}}/>LIVE
      </div>
      <div style={{flex:1,overflow:'hidden'}}>
        <div ref={ref} style={{display:'flex',alignItems:'center',height:36,whiteSpace:'nowrap',willChange:'transform'}}>
          {doubled.map((item,i) => (
            <React.Fragment key={i}>
              <span style={{display:'inline-flex',alignItems:'center',gap:8,padding:'0 24px',fontSize:11.5,color:'rgba(255,255,255,.28)'}}>
                <span style={{width:5,height:5,borderRadius:'50%',background:heatColor(item.published_at||item.h),display:'inline-block',flexShrink:0,opacity:.8}}/>
                <span style={{fontSize:9,fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase',color:'rgba(255,255,255,.18)'}}>{item.source_name||item.src}</span>
                <span>{item.title}</span>
              </span>
              <span style={{color:'rgba(255,255,255,.08)',fontSize:16,lineHeight:1}}>·</span>
            </React.Fragment>
          ))}
        </div>
      </div>
    </div>
  );
}

const FALLBACK_TICKER = [
  {src:'TechCrunch',title:'OpenAI announces GPT-5 with enhanced reasoning and multimodal input',h:1},
  {src:'BBC World',title:'EU passes landmark AI regulation framework after two years of negotiations',h:3},
  {src:'MarketWatch',title:'Nasdaq hits record high as tech giants beat Q3 earnings estimates',h:5},
  {src:'Al Jazeera',title:'UN Security Council convenes emergency session on eastern Europe',h:7},
  {src:'Wired',title:'Inside the push to regulate foundation models before they become infrastructure',h:11},
];

/* ── WRITER SIDEBAR CARD ─────────────────────────────────── */
function WriterCard({ writer, selected, onClick, C }) {
  const active = selected?.name === writer.name;
  const color = writerColor(writer.name);
  return (
    <div onClick={onClick} style={{
      padding:'12px 15px', cursor:'pointer',
      borderBottom:`1px solid ${C.borderSub}`,
      background: active ? C.accentSurf : 'transparent',
      borderLeft:`3px solid ${active ? C.accent : 'transparent'}`,
      transition:'background .12s',
    }}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{
          width:38,height:38,borderRadius:'50%',
          background: active ? color+'18' : color+'12',
          border:`1.5px solid ${color}${active?'55':'30'}`,
          display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
        }}>
          <WriterIcon name={writer.name} color={color}/>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12.5,fontWeight:700,color:C.t1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{writer.name}</div>
          <span style={{fontSize:9,fontWeight:600,letterSpacing:'.04em',padding:'1px 7px',borderRadius:99,background:`${color}15`,color}}>{writerArchetype(writer.name)}</span>
        </div>
        <div style={{textAlign:'right',flexShrink:0}}>
          <div style={{fontSize:13.5,fontWeight:800,color: active ? C.accent : scoreColor(writer.score,C)}}>{writer.score.toFixed(3)}</div>
          <div style={{fontSize:9,color:C.muted}}>#{writer.rank}</div>
        </div>
      </div>
      <div style={{height:3,background:C.border,borderRadius:2,margin:'8px 0 4px',overflow:'hidden'}}>
        <div style={{height:'100%',width:`${Math.min(writer.score*100,100)}%`,background:color,borderRadius:2,opacity:.65}}/>
      </div>
      <div style={{fontSize:9,color:C.muted}}>prompt v{writer.promptV} · mutated {writer.mutations}×</div>
    </div>
  );
}

/* ── WELCOME SCREEN ──────────────────────────────────────── */
function WelcomeScreen({ onStart, C }) {
  const steps = [
    {n:'01', title:'Real news, daily', body:'17 RSS feeds are polled every 2 hours. The top stories seed each simulation cycle.'},
    {n:'02', title:'5 writers tweet', body:"Each writer has a distinct persona and a style prompt. They independently write tweets about the day's top stories."},
    {n:'03', title:'100 readers vote', body:'100 simulated reader personas across 10 archetypes evaluate every tweet — liking, reposting, commenting, or skipping.'},
    {n:'04', title:'Losers evolve', body:"Bottom writers get their style prompt rewritten each cycle, guided by the winner's approach. Watch the strategies shift."},
  ];
  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 48px',background:C.bg,overflowY:'auto',animation:'fadeIn .3s ease'}}>
      <div style={{maxWidth:620,width:'100%'}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontSize:10,fontWeight:600,letterSpacing:'.18em',color:C.muted,textTransform:'uppercase',marginBottom:12}}>What you're looking at</div>
          <h1 style={{fontFamily:'Lora',fontSize:28,fontWeight:700,color:C.t1,lineHeight:1.25,marginBottom:14}}>A live AI writer competition</h1>
          <p style={{fontSize:14,color:C.t4,lineHeight:1.85,maxWidth:460,margin:'0 auto'}}>Five LLM-powered writers tweet about real headlines every day. 100 reader personas score them. The bottom writers get their prompts rewritten. Every cycle, the strategies evolve.</p>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:32}}>
          {steps.map((s,i) => (
            <div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:'18px 20px',boxShadow:'0 1px 3px rgba(26,15,8,.05)'}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                <span style={{fontSize:20,lineHeight:1}}>{['📡','✍️','👥','🔁'][i]}</span>
                <span style={{fontSize:9,fontWeight:700,letterSpacing:'.14em',color:C.faint,textTransform:'uppercase'}}>{s.n}</span>
              </div>
              <div style={{fontFamily:'Lora',fontSize:13.5,fontWeight:600,color:C.t1,marginBottom:6}}>{s.title}</div>
              <div style={{fontSize:12.5,color:C.t4,lineHeight:1.7}}>{s.body}</div>
            </div>
          ))}
        </div>
        <div style={{textAlign:'center'}}>
          <button onClick={onStart} style={{
            background:C.accent,border:'none',borderRadius:10,color:'#fff',
            fontSize:13.5,fontWeight:600,padding:'12px 30px',cursor:'pointer',
            fontFamily:'DM Sans',boxShadow:`0 4px 14px ${C.accent}50`,letterSpacing:'.01em',
          }}>Explore the competition →</button>
          <div style={{fontSize:11,color:C.faint,marginTop:10}}>or click any writer in the sidebar</div>
        </div>
      </div>
    </div>
  );
}

/* ── WRITER HERO ─────────────────────────────────────────── */
function WriterHero({ writer, C }) {
  const color = writerColor(writer.name);
  return (
    <div style={{flexShrink:0,padding:'18px 22px',background:C.surface,borderBottom:`1px solid ${C.border}`,boxShadow:'0 1px 0 rgba(26,15,8,.04)'}}>
      <div style={{display:'flex',alignItems:'flex-start',gap:14}}>
        <div style={{
          width:52,height:52,borderRadius:'50%',
          background:`${color}14`,
          border:`2px solid ${color}40`,
          display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
        }}>
          <WriterIcon name={writer.name} color={color} size={26}/>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:5,flexWrap:'wrap'}}>
            <span style={{fontFamily:'Lora',fontSize:18,fontWeight:700,color:C.t1}}>{writer.name}</span>
            <span style={{fontSize:10,fontWeight:600,padding:'2px 9px',borderRadius:99,background:`${color}15`,color,border:`1px solid ${color}35`}}>{writerArchetype(writer.name)}</span>
            <span style={{fontSize:10,fontWeight:600,padding:'2px 9px',borderRadius:99,background:C.surface2,color:C.muted}}>Rank {writer.rank}</span>
          </div>
          {writer.persona && (
            <div style={{fontSize:13,color:C.t4,lineHeight:1.7,marginBottom:12,maxWidth:520}}>{writer.persona}</div>
          )}
          {writer.currentPrompt && (
            <div style={{background:C.accentSurf,borderLeft:`3px solid ${C.accent}`,borderRadius:'0 8px 8px 0',padding:'9px 14px',maxWidth:520}}>
              <div style={{fontSize:8.5,fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',color:C.accent,marginBottom:4,opacity:.8}}>Current strategy — prompt v{writer.promptV}</div>
              <div style={{fontFamily:'Lora',fontSize:13,color:C.t2,fontStyle:'italic',lineHeight:1.75}}>"{writer.currentPrompt}"</div>
            </div>
          )}
        </div>
        <div style={{textAlign:'right',flexShrink:0,paddingTop:2}}>
          <div style={{fontFamily:'Lora',fontSize:30,fontWeight:700,color:scoreColor(writer.score,C),lineHeight:1,letterSpacing:'-.02em'}}>{writer.score.toFixed(3)}</div>
          <div style={{fontSize:10,color:C.muted,marginTop:5}}>engagement score</div>
          <div style={{fontSize:10,color:C.faint,marginTop:2}}>v{writer.promptV} · {writer.mutations} mutations</div>
        </div>
      </div>
    </div>
  );
}

/* ── TWEET CARD ──────────────────────────────────────────── */
function TweetCard({ tweet, writer, C }) {
  const sc = tweet.score;
  const color = writerColor(writer.name);
  const sty = sc>=0.5
    ? {bg:C.greenSurf, c:C.green, bdr:C.greenBord}
    : sc>=0.43
    ? {bg:C.accentSurf, c:C.accent, bdr:C.accentBord}
    : {bg:'#fdf3e0', c:C.amber, bdr:'#e8cc88'};
  return (
    <div style={{margin:'10px 14px',background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:'14px 16px',animation:'fadeIn .18s ease',boxShadow:'0 1px 4px rgba(26,15,8,.04)'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
        <div style={{width:36,height:36,borderRadius:'50%',background:`${color}14`,border:`1.5px solid ${color}35`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <WriterIcon name={writer.name} color={color}/>
        </div>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:C.t1}}>{writer.name}</div>
          <div style={{fontSize:10,color:C.muted}}>prompt v{tweet.prompt_version||writer.promptV}</div>
        </div>
      </div>
      <div style={{fontSize:14,color:C.t2,lineHeight:1.8,marginBottom:12}}>{tweet.content||tweet.text}</div>
      <div style={{display:'flex',alignItems:'center',gap:8,borderTop:`1px solid ${C.borderSub}`,paddingTop:10}}>
        {tweet.repost_count!=null && (
          <span style={{fontSize:11,color:C.muted}}>↻ {tweet.repost_count}</span>
        )}
        {tweet.like_count!=null && (
          <span style={{fontSize:11,color:C.muted}}>♥ {tweet.like_count}</span>
        )}
        {tweet.comment_count!=null && (
          <span style={{fontSize:11,color:C.muted}}>💬 {tweet.comment_count}</span>
        )}
        <span style={{fontSize:11,fontWeight:700,padding:'3px 11px',borderRadius:99,background:sty.bg,color:sty.c,border:`1px solid ${sty.bdr}`,marginLeft:'auto'}}>
          score {sc.toFixed(3)}
        </span>
      </div>
    </div>
  );
}

/* ── EVOLUTION ENTRY ─────────────────────────────────────── */
function EvoEntry({ entry, isCurrent, C }) {
  const isMut = entry.version_number > 1;
  return (
    <div style={{
      padding:'14px 16px',
      borderBottom:`1px solid ${C.borderSub}`,
      borderLeft:`3px solid ${isCurrent ? C.accent : isMut ? '#c49030' : 'transparent'}`,
      background: isCurrent ? C.accentSurf : 'transparent',
    }}>
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6,flexWrap:'wrap'}}>
        <span style={{
          fontSize:10,fontWeight:700,padding:'2px 9px',borderRadius:99,
          background: isCurrent ? C.accentSurf : C.surface2,
          color: isCurrent ? C.accent : C.muted,
          border: isCurrent ? `1px solid ${C.accentBord}` : 'none',
        }}>v{entry.version_number}{isCurrent ? ' · current' : ''}</span>
        <span style={{fontSize:9.5,color:C.faint}}>cycle {entry.cycle_introduced}</span>
        {entry.avg_score_while_active!=null && (
          <span style={{marginLeft:'auto',fontSize:10,fontWeight:700,color:scoreColor(entry.avg_score_while_active,C)}}>{entry.avg_score_while_active.toFixed(3)}</span>
        )}
      </div>
      {isMut && entry.triggered_by_score!=null && (
        <div style={{fontSize:11,color:'#9a6818',fontStyle:'italic',marginBottom:7}}>
          ↳ Rewritten after scoring {entry.triggered_by_score.toFixed(3)}
        </div>
      )}
      <div style={{
        fontFamily: isCurrent ? 'Lora' : 'DM Sans',
        fontStyle: isCurrent ? 'italic' : 'normal',
        fontSize:13,color:C.t3,lineHeight:1.75,
      }}>{entry.style_prompt}</div>
    </div>
  );
}

/* ── LOADING SPINNER ─────────────────────────────────────── */
function Spinner({ C }) {
  return (
    <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:14}}>
      <div style={{width:28,height:28,borderRadius:'50%',border:`3px solid ${C.border}`,borderTopColor:C.accent,animation:'spin .8s linear infinite'}}/>
      <div style={{fontSize:12,color:C.muted}}>Loading…</div>
    </div>
  );
}

/* ── ERROR STATE ─────────────────────────────────────────── */
function ErrorState({ message, C }) {
  return (
    <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:10,padding:40}}>
      <div style={{fontSize:13,color:C.muted,textAlign:'center',lineHeight:1.8,maxWidth:340}}>{message}</div>
    </div>
  );
}

/* ── APP ─────────────────────────────────────────────────── */
function App() {
  const C = makeC(ACCENT_DEFAULT);

  // Data state
  const [loading, setLoading]     = React.useState(true);
  const [error, setError]         = React.useState(null);
  const [cycleInfo, setCycleInfo] = React.useState(null);
  const [writers, setWriters]     = React.useState([]);
  const [tweetsByWriter, setTweetsByWriter] = React.useState({});
  const [tickerItems, setTickerItems]       = React.useState(FALLBACK_TICKER);

  // UI state
  const [sel, setSel]                   = React.useState(null);
  const [tab, setTab]                   = React.useState('tweets');
  const [showWelcome, setShowWelcome]   = React.useState(() => !localStorage.getItem('sa_seen'));
  const [evoData, setEvoData]           = React.useState({});
  const [evoLoading, setEvoLoading]     = React.useState(false);

  // Fetch simulation data on mount
  React.useEffect(() => {
    Promise.all([
      fetch('/simulation/latest').then(r => r.ok ? r.json() : Promise.reject(r.status)),
      fetch('/simulation/writers').then(r => r.ok ? r.json() : Promise.reject(r.status)),
      fetch('/articles?page_size=14').then(r => r.ok ? r.json() : null).catch(() => null),
    ])
    .then(([latestData, writersData, articlesData]) => {
      // Merge leaderboard with writer personas
      const writerMeta = {};
      (writersData?.writers || []).forEach(w => { writerMeta[w.name] = w; });

      const leaderboard = latestData.leaderboard || [];
      const tweetsRaw   = latestData.tweets || [];

      // Build writers array from leaderboard (already sorted by rank)
      const writerList = leaderboard.map(lb => {
        const meta = writerMeta[lb.writer_name] || {};
        return {
          name:          lb.writer_name,
          score:         lb.engagement_score,
          rank:          lb.rank,
          promptV:       lb.prompt_version || meta.current_version || 1,
          mutations:     meta.total_mutations || 0,
          persona:       meta.persona || '',
          currentPrompt: meta.current_style_prompt || '',
          tweetCount:    lb.tweet_count,
          readers:       lb.readers_sampled,
        };
      });

      // Group tweets by writer
      const tweetMap = {};
      tweetsRaw.forEach(tw => {
        if (!tweetMap[tw.writer_name]) tweetMap[tw.writer_name] = [];
        tweetMap[tw.writer_name].push(tw);
      });

      setWriters(writerList);
      setTweetsByWriter(tweetMap);
      setCycleInfo(latestData.cycle);

      if (articlesData?.items?.length) {
        setTickerItems(articlesData.items);
      }
    })
    .catch(err => {
      setError('No simulation data yet. Run simulation_dag in Airflow to start.');
    })
    .finally(() => setLoading(false));
  }, []);

  // Fetch evolution when writer is selected
  function selectWriter(w) {
    setSel(w);
    setTab('tweets');
    localStorage.setItem('sa_seen', '1');
    setShowWelcome(false);

    if (!evoData[w.name]) {
      setEvoLoading(true);
      fetch(`/simulation/writers/${encodeURIComponent(w.name)}/evolution`)
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(data => {
          setEvoData(prev => ({...prev, [w.name]: data}));
        })
        .catch(() => {})
        .finally(() => setEvoLoading(false));
    }
  }

  function showHelp() { setSel(null); setShowWelcome(true); }

  const selEvo = sel ? evoData[sel.name] : null;
  const selTweets = sel ? (tweetsByWriter[sel.name] || []) : [];

  // Cycle date display
  const cycleLabel = cycleInfo
    ? `Cycle ${cycleInfo.cycle_number} · ${fmtCycleDate(cycleInfo.completed_at)}`
    : 'Signal Atlas';

  return (
    <>
      <div style={{position:'fixed',top:0,left:0,right:0,bottom:36,display:'flex',flexDirection:'column',zIndex:5}}>

        {/* ── Header ── */}
        <div style={{
          flexShrink:0,height:54,background:C.surface,
          borderBottom:`1px solid ${C.border}`,
          display:'flex',alignItems:'center',gap:14,padding:'0 20px',
          boxShadow:'0 1px 0 rgba(26,15,8,.05)',
        }}>
          <div>
            <div style={{fontFamily:'Lora',fontSize:16,fontWeight:700,color:C.t1,letterSpacing:'-.01em',lineHeight:1.2}}>Signal Atlas</div>
            <div style={{fontSize:9.5,color:C.muted,marginTop:2,letterSpacing:'.01em'}}>5 writers · 100 readers · prompts evolve daily</div>
          </div>
          {/* Live badge */}
          <div style={{display:'inline-flex',alignItems:'center',gap:5,padding:'3px 10px',borderRadius:99,background:C.greenSurf,border:`1px solid ${C.greenBord}`,color:C.greenDark,fontSize:9.5,fontWeight:700,letterSpacing:'.10em'}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:C.green,animation:'livePulse 1.8s ease-in-out infinite',display:'inline-block'}}/>
            LIVE
          </div>
          {/* Cycle badge */}
          {cycleInfo && (
            <div style={{display:'inline-flex',alignItems:'center',gap:6,padding:'3px 12px',borderRadius:99,background:C.surface2,border:`1px solid ${C.border}`,color:C.t4,fontSize:10.5,fontWeight:600}}>
              {cycleLabel}
            </div>
          )}
          <div style={{flex:1}}/>
          <button onClick={showHelp} style={{
            background:'none',border:`1px solid ${C.border}`,borderRadius:8,
            color:C.t4,fontSize:11.5,fontWeight:600,padding:'6px 13px',
            cursor:'pointer',fontFamily:'DM Sans',transition:'all .15s',
            display:'flex',alignItems:'center',gap:5,
          }}>
            <span style={{fontSize:13,lineHeight:1}}>?</span> How it works
          </button>
        </div>

        {/* ── Body ── */}
        <div style={{flex:1,display:'flex',overflow:'hidden'}}>

          {/* Sidebar */}
          <div style={{width:250,flexShrink:0,borderRight:`1px solid ${C.border}`,background:C.sidebar,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <div style={{padding:'11px 15px 8px',borderBottom:`1px solid ${C.borderSub}`,flexShrink:0}}>
              <div style={{fontSize:8.5,fontWeight:700,letterSpacing:'.18em',color:C.faint,textTransform:'uppercase'}}>Writers</div>
              <div style={{fontSize:10,color:C.faint,marginTop:1}}>ranked by engagement</div>
            </div>
            <div style={{flex:1,overflowY:'auto'}}>
              {loading ? (
                <div style={{padding:20,display:'flex',flexDirection:'column',gap:10}}>
                  {[1,2,3,4,5].map(i => (
                    <div key={i} style={{height:72,background:C.border,borderRadius:10,opacity:.4+(i*.05)}}/>
                  ))}
                </div>
              ) : writers.length === 0 ? (
                <div style={{padding:'20px 15px',fontSize:12,color:C.faint,lineHeight:1.7}}>No writers yet. Run a simulation cycle first.</div>
              ) : (
                writers.map(w => <WriterCard key={w.name} writer={w} selected={sel} onClick={() => selectWriter(w)} C={C}/>)
              )}
            </div>
            {!sel && !loading && writers.length > 0 && (
              <div style={{padding:'12px 15px',borderTop:`1px solid ${C.borderSub}`,flexShrink:0}}>
                <div style={{fontSize:11,color:C.faint,lineHeight:1.65}}>← Select a writer to explore their tweets and prompt evolution.</div>
              </div>
            )}
          </div>

          {/* Main panel */}
          {loading ? (
            <Spinner C={C}/>
          ) : error ? (
            <ErrorState message={error} C={C}/>
          ) : (showWelcome || !sel) ? (
            <WelcomeScreen onStart={() => writers.length > 0 && selectWriter(writers[0])} C={C}/>
          ) : (
            <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',animation:'fadeIn .2s ease'}}>
              <WriterHero writer={sel} C={C}/>
              {/* Tabs */}
              <div style={{flexShrink:0,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',paddingLeft:14}}>
                {['tweets','evolution'].map(t => (
                  <button key={t} onClick={() => setTab(t)} style={{
                    padding:'11px 16px',border:'none',
                    borderBottom:`2px solid ${tab===t ? C.accent : 'transparent'}`,
                    background:'none',color:tab===t ? C.accent : C.muted,
                    fontSize:13,fontWeight:600,cursor:'pointer',
                    fontFamily:'DM Sans',transition:'color .15s',
                  }}>
                    {t==='tweets'
                      ? `Tweets (${selTweets.length})`
                      : `Evolution (${selEvo?.versions?.length ?? '…'} versions)`}
                  </button>
                ))}
              </div>
              {/* Content */}
              <div style={{flex:1,overflowY:'auto',background:tab==='tweets' ? C.bg : C.surface}}>
                {tab==='tweets' ? (
                  selTweets.length === 0
                    ? <div style={{padding:24,fontSize:13,color:C.muted}}>No tweets for this writer in the current cycle.</div>
                    : selTweets.map((tw,i) => <TweetCard key={i} tweet={{...tw, score: tw.engagement_score}} writer={sel} C={C}/>)
                ) : (
                  evoLoading ? (
                    <Spinner C={C}/>
                  ) : !selEvo ? (
                    <div style={{padding:24,fontSize:13,color:C.muted}}>No evolution data available.</div>
                  ) : (
                    <>
                      <div style={{padding:'12px 16px',background:'#fef5e4',borderBottom:'1px solid #f0ddb8'}}>
                        <div style={{fontSize:12.5,color:'#7a4e10',lineHeight:1.7}}>
                          <b style={{fontWeight:700,color:'#5a3808'}}>{sel.name}</b> has been rewritten{' '}
                          <b style={{fontWeight:700,color:'#5a3808'}}>{selEvo.total_mutations}×</b>{' '}
                          across {selEvo.versions.length} prompt versions. Each rewrite was triggered when engagement fell below the cycle threshold set by the top performer.
                        </div>
                      </div>
                      {[...selEvo.versions].reverse().map((e,i) => (
                        <EvoEntry key={i} entry={e} isCurrent={e.version_number === selEvo.current_version} C={C}/>
                      ))}
                    </>
                  )
                )}
              </div>
            </div>
          )}
        </div>
      </div>

      <Ticker items={tickerItems}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
