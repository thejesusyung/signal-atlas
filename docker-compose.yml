services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    build: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: []
    command:
      - bash
      - -lc
      - |
        export PGPASSWORD='${POSTGRES_PASSWORD}' &&
        if ! psql -h ${POSTGRES_HOST} -U ${POSTGRES_USER} -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = '${AIRFLOW_DB_NAME}'" | grep -qx 1; then
          psql -h ${POSTGRES_HOST} -U ${POSTGRES_USER} -d postgres -c "CREATE DATABASE ${AIRFLOW_DB_NAME}";
        fi &&
        if ! psql -h ${POSTGRES_HOST} -U ${POSTGRES_USER} -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = '${MLFLOW_DB_NAME}'" | grep -qx 1; then
          psql -h ${POSTGRES_HOST} -U ${POSTGRES_USER} -d postgres -c "CREATE DATABASE ${MLFLOW_DB_NAME}";
        fi &&
        alembic upgrade head &&
        airflow db migrate &&
        if ! airflow users list | tail -n +3 | awk '{print $$1}' | grep -qx '${AIRFLOW_ADMIN_USERNAME}'; then
          airflow users create --role Admin --username ${AIRFLOW_ADMIN_USERNAME} --password ${AIRFLOW_ADMIN_PASSWORD} --firstname Airflow --lastname Admin --email ${AIRFLOW_ADMIN_EMAIL};
        fi &&
        airflow pools set llm_pool 3 'LLM extraction concurrency limit'
    volumes:
      - ./alembic:/opt/project/alembic
      - ./alembic.ini:/opt/project/alembic.ini
      - ./dags:/opt/project/dags
      - ./src:/opt/project/src
      - ./config:/opt/project/config
      - ./data:/opt/project/data
      - ./mlruns:/opt/project/mlruns

  airflow-webserver:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
    command: airflow webserver
    ports:
      - "8080:8080"
    volumes:
      - ./alembic:/opt/project/alembic
      - ./alembic.ini:/opt/project/alembic.ini
      - ./dags:/opt/project/dags
      - ./src:/opt/project/src
      - ./config:/opt/project/config
      - ./data:/opt/project/data
      - ./mlruns:/opt/project/mlruns

  airflow-scheduler:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
    command: airflow scheduler
    volumes:
      - ./alembic:/opt/project/alembic
      - ./alembic.ini:/opt/project/alembic.ini
      - ./dags:/opt/project/dags
      - ./src:/opt/project/src
      - ./config:/opt/project/config
      - ./data:/opt/project/data
      - ./mlruns:/opt/project/mlruns

  mlflow:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - ${MLFLOW_BACKEND_STORE_URI}
      - --default-artifact-root
      - ${MLFLOW_ARTIFACT_ROOT}
    ports:
      - "5000:5000"
    volumes:
      - ./alembic:/opt/project/alembic
      - ./alembic.ini:/opt/project/alembic.ini
      - ./mlruns:/opt/project/mlruns
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
      - uvicorn
      - news_pipeline.api.app:app
      - --host
      - 0.0.0.0
      - --port
      - "${API_PORT}"
    ports:
      - "${API_PORT}:${API_PORT}"
    volumes:
      - ./alembic:/opt/project/alembic
      - ./alembic.ini:/opt/project/alembic.ini
      - ./src:/opt/project/src
      - ./config:/opt/project/config
      - ./mlruns:/opt/project/mlruns

volumes:
  postgres_data:
