services:
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: pet-signal-api:latest
    restart: unless-stopped
    env_file:
      - .env.prod
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mlflow server \
          --host 0.0.0.0 \
          --port 5000 \
          --backend-store-uri $$MLFLOW_BACKEND_STORE_URI \
          --artifacts-destination $$MLFLOW_ARTIFACT_ROOT \
          --serve-artifacts
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/opt/project/mlruns
    mem_limit: 900m
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: pet-signal-api:latest
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "${API_PORT}:${API_PORT}"
    volumes:
      - ./src:/opt/project/src
      - ./config:/opt/project/config
      - ./mlruns:/opt/project/mlruns
    mem_limit: 300m
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${API_PORT}/stats >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      mlflow:
        condition: service_healthy
